<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摇一摇挑战 - 扫码进入</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif}
h1{font-size:28px;font-weight:800;margin-bottom:8px}
p{opacity:.85;margin-bottom:32px;font-size:15px}
.qr-box{background:#fff;padding:24px;border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.qr-box canvas{display:block}
.url{margin-top:24px;font-size:13px;opacity:.6;word-break:break-all;text-align:center;max-width:320px}
</style>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
  <h1>📳 摇一摇挑战</h1>
  <p>用微信扫下方二维码即可开始</p>
  <div class="qr-box" id="qrcode"></div>
  <div class="url" id="urlText"></div>
<script>
var url = "https://d3727aa0886c479c8f2356023e61336a.app.codebuddy.work";
new QRCode(document.getElementById("qrcode"), {
  text: url,
  width: 240,
  height: 240,
  correctLevel: QRCode.CorrectLevel.H
});
document.getElementById("urlText").textContent = url;
</script>
</body>
</html>
